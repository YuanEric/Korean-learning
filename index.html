<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>한국어 · Korean Learning Path → TOPIK 5+</title>
<style>
  :root{
    --bg:#0f1117; --panel:#171a23; --panel2:#1e222e; --line:#2a2f3d;
    --txt:#e7e9ee; --muted:#9aa3b2; --accent:#6366f1; --accent2:#0ea5e9;
    --good:#10b981; --bad:#ef4444; --warn:#f59e0b;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Malgun Gothic","Apple SD Gothic Neo",sans-serif;
    background:var(--bg);color:var(--txt);line-height:1.6}
  a{color:var(--accent2);text-decoration:none}
  header{padding:28px 20px;text-align:center;background:linear-gradient(135deg,#1b1f2e,#0f1117);border-bottom:1px solid var(--line)}
  header h1{margin:0;font-size:30px;letter-spacing:-.5px}
  header p{margin:6px 0 0;color:var(--muted)}
  .wrap{max-width:920px;margin:0 auto;padding:20px}
  .layout{display:grid;grid-template-columns:260px 1fr;gap:20px}
  @media(max-width:760px){.layout{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:18px}
  h2{font-size:20px;margin:0 0 12px}
  h3{font-size:16px;color:var(--accent2);margin:22px 0 8px;text-transform:uppercase;letter-spacing:.5px}
  .sidebar .day-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:9px;cursor:pointer;margin-bottom:6px;border:1px solid transparent}
  .sidebar .day-item:hover{background:var(--panel2)}
  .sidebar .day-item.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .sidebar .day-item .done{color:var(--good);font-size:13px}
  .pill{display:inline-block;font-size:12px;padding:3px 9px;border-radius:999px;background:var(--panel2);color:var(--muted);border:1px solid var(--line)}
  .progress-out{height:9px;background:var(--panel2);border-radius:999px;overflow:hidden;margin:10px 0}
  .progress-in{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2))}
  .hangul-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
  .glyph{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:14px;text-align:center}
  .glyph .ch{font-size:40px;line-height:1}
  .glyph .snd{color:var(--accent2);font-weight:600;margin-top:6px;font-size:14px}
  .glyph .nt{color:var(--muted);font-size:12px;margin-top:4px}
  .read-row{display:flex;align-items:baseline;gap:14px;padding:8px 0;border-bottom:1px dashed var(--line)}
  .read-row .blk{font-size:30px;min-width:48px}
  .read-row .bd{color:var(--muted)}
  .ex{background:var(--panel2);border-left:3px solid var(--accent);border-radius:8px;padding:10px 14px;margin:8px 0}
  .ex .ko{font-size:18px}
  .ex .en{color:var(--muted);font-size:14px}
  table.vocab{width:100%;border-collapse:collapse}
  table.vocab td{padding:9px 10px;border-bottom:1px solid var(--line)}
  table.vocab .ko{font-size:20px;font-weight:600;width:90px}
  table.vocab .nt{color:var(--muted);font-size:13px}
  details{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:10px 14px;margin:8px 0}
  details summary{cursor:pointer;font-weight:500}
  details .ans{margin-top:8px;color:var(--good)}
  .quiz-q{margin:16px 0}
  .quiz-q .opts{display:grid;gap:8px;margin-top:8px}
  .opt{padding:10px 14px;border:1px solid var(--line);border-radius:9px;background:var(--panel2);cursor:pointer;font-size:16px}
  .opt:hover{border-color:var(--accent)}
  .opt.correct{background:rgba(16,185,129,.18);border-color:var(--good)}
  .opt.wrong{background:rgba(239,68,68,.18);border-color:var(--bad)}
  .opt .why{display:block;font-size:13px;color:var(--muted);margin-top:6px}
  .btn{background:var(--accent);color:#fff;border:none;padding:10px 18px;border-radius:9px;cursor:pointer;font-size:15px}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--txt)}
  .score{font-size:18px;font-weight:600;margin-top:10px}
  .phase-row{display:flex;gap:10px;align-items:center;padding:8px 0}
  .phase-dot{width:12px;height:12px;border-radius:50%;flex:0 0 auto}
  .phase-row .pt{font-size:13px;color:var(--muted)}
  .muted{color:var(--muted)}
  .topbtns{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
</style>
</head>
<body>
<header>
  <h1>한국어 학습 · Korean Learning Path</h1>
  <p>Beginner → <strong>TOPIK 5+</strong> · one lesson a day</p>
</header>

<div class="wrap">
  <div class="card">
    <h2>Your Roadmap</h2>
    <div id="roadmap"></div>
    <div class="progress-out"><div class="progress-in" id="overallBar" style="width:0%"></div></div>
    <p class="muted" id="overallTxt"></p>
  </div>

  <div class="layout">
    <div class="sidebar">
      <div class="card">
        <h2>Lessons</h2>
        <div id="dayList"></div>
      </div>
    </div>
    <div>
      <div id="lessonArea"></div>
    </div>
  </div>
</div>

<script>
  // Load lesson data fresh every visit (cache-busted) so daily updates show
  // immediately and a stale CDN copy can never blank the page.
  (function(){
    var s = document.createElement('script');
    s.src = 'lessons.js?t=' + Date.now();
    s.onload = function(){
      try { init(); }
      catch(e){ document.getElementById('lessonArea').innerHTML =
        '<div class="card">Something went wrong rendering the lesson: ' + e.message + '</div>'; }
    };
    s.onerror = function(){
      document.getElementById('lessonArea').innerHTML =
        '<div class="card">Could not load lessons.js. Try a hard refresh.</div>';
    };
    document.head.appendChild(s);
  })();
</script>
<script>
  // progress persisted in the browser so checkmarks stick across visits
  let progress = {};
  try { progress = JSON.parse(localStorage.getItem('korean_progress') || '{}'); } catch(e) { progress = {}; }
  function saveProgress(){ try { localStorage.setItem('korean_progress', JSON.stringify(progress)); } catch(e){} }

  const lessonArea = document.getElementById('lessonArea');
  const dayList = document.getElementById('dayList');
  let current; // set in init() once lessons.js has loaded

  function renderRoadmap(){
    const rm = document.getElementById('roadmap');
    rm.innerHTML = CURRICULUM.phases.map(p => `
      <div class="phase-row">
        <span class="phase-dot" style="background:${p.color}"></span>
        <div>
          <strong>${p.name}</strong> <span class="pill">${p.days}</span>
          <div class="pt">${p.target}</div>
        </div>
      </div>`).join('');
    const total = LESSONS.length;
    const done = Object.keys(progress).length;
    document.getElementById('overallBar').style.width = (total? done/total*100:0) + '%';
    document.getElementById('overallTxt').textContent =
      `${total} lesson${total>1?'s':''} published · ${done} completed`;
  }

  function renderDayList(){
    dayList.innerHTML = LESSONS.map(l => `
      <div class="day-item ${l.day===current?'active':''}" onclick="openDay(${l.day})">
        <span>Day ${l.day} · ${l.title}</span>
        ${progress[l.day]?'<span class="done">✓</span>':''}
      </div>`).reverse().join('');
  }

  function openDay(day){ current = day; renderDayList(); renderLesson(); window.scrollTo({top:0,behavior:'smooth'}); }

  function renderLesson(){
    const l = LESSONS.find(x => x.day === current);
    if(!l){ lessonArea.innerHTML = '<div class="card">No lesson yet.</div>'; return; }
    const phase = CURRICULUM.phases.find(p=>p.id===l.phase);

    let html = `<div class="card">
      <span class="pill" style="border-color:${phase.color};color:${phase.color}">${phase.name}</span>
      <h2 style="margin-top:10px">Day ${l.day}: ${l.title}</h2>
      <p class="muted">${l.focus}</p>`;

    if(l.hangul){
      html += `<h3>1 · Hangul & Reading</h3><p>${l.hangul.intro}</p>
        <div class="hangul-grid">` +
        l.hangul.items.map(i=>`<div class="glyph"><div class="ch">${i.char}</div><div class="snd">${i.sound}</div><div class="nt">${i.note}</div></div>`).join('') +
        `</div>`;
      if(l.hangul.reading){
        html += `<h3>Read these blocks</h3>` +
          l.hangul.reading.map(r=>`<div class="read-row"><span class="blk">${r.block}</span><span class="bd">${r.breakdown}</span></div>`).join('');
      }
    }

    if(l.grammar){
      html += `<h3>2 · Grammar — ${l.grammar.point}</h3><p>${l.grammar.explanation}</p>` +
        l.grammar.examples.map(e=>`<div class="ex"><div class="ko">${e.ko}</div><div class="en">${e.en}</div></div>`).join('');
    }

    if(l.vocab){
      html += `<h3>3 · Vocabulary</h3><table class="vocab">` +
        l.vocab.map(v=>`<tr><td class="ko">${v.ko}</td><td>${v.en}</td><td class="nt">${v.note||''}</td></tr>`).join('') +
        `</table>`;
    }

    if(l.exercises){
      html += `<h3>4 · Practice</h3>` +
        l.exercises.map((e,i)=>`<details><summary>${i+1}. ${e.q}</summary><div class="ans">→ ${e.a}</div></details>`).join('');
    }

    html += `</div>`;

    if(l.quiz){
      html += `<div class="card"><h3 style="margin-top:0">5 · Quiz</h3><div id="quiz"></div>
        <div class="topbtns"><button class="btn" onclick="gradeQuiz()">Check answers</button>
        <button class="btn ghost" onclick="renderLesson()">Reset</button></div>
        <div class="score" id="scoreLine"></div></div>`;
    }

    lessonArea.innerHTML = html;
    if(l.quiz) renderQuiz(l.quiz);
  }

  let quizState = [];
  function renderQuiz(quiz){
    quizState = quiz.map(()=>null);
    const box = document.getElementById('quiz');
    box.innerHTML = quiz.map((q,qi)=>`
      <div class="quiz-q"><strong>${qi+1}. ${q.q}</strong>
        <div class="opts" id="q${qi}">` +
        q.options.map((o,oi)=>`<div class="opt" onclick="pick(${qi},${oi})" data-q="${qi}" data-o="${oi}">${o}</div>`).join('') +
      `</div></div>`).join('');
  }
  function pick(qi,oi){
    quizState[qi]=oi;
    document.querySelectorAll('#q'+qi+' .opt').forEach(el=>el.style.borderColor='');
    document.querySelector('#q'+qi+' .opt[data-o="'+oi+'"]').style.borderColor='var(--accent)';
  }
  function gradeQuiz(){
    const l = LESSONS.find(x=>x.day===current);
    let correct=0;
    l.quiz.forEach((q,qi)=>{
      const opts=document.querySelectorAll('#q'+qi+' .opt');
      opts.forEach((el,oi)=>{
        el.classList.remove('correct','wrong');
        if(oi===q.answer){ el.classList.add('correct'); el.innerHTML=q.options[oi]+'<span class="why">'+q.explain+'</span>'; }
        if(quizState[qi]===oi && oi!==q.answer){ el.classList.add('wrong'); }
      });
      if(quizState[qi]===q.answer) correct++;
    });
    const total=l.quiz.length;
    document.getElementById('scoreLine').textContent = `Score: ${correct}/${total}` + (correct===total?'  🎉 Perfect — lesson complete!':'');
    if(correct===total){ progress[current]=true; saveProgress(); renderDayList(); renderRoadmap(); }
  }

  function init(){
    current = LESSONS[LESSONS.length - 1].day;
    renderRoadmap(); renderDayList(); renderLesson();
  }
</script>
</body>
</html>
